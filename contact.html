<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - 하루 인사이트</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="index.html" class="logo">하루 인사이트</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="blog/index.html">Blog</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
                <button id="theme-toggle" class="theme-toggle">🌙</button>
            </div>
        </div>
    </nav>
    <main class="container">
        <article class="content-wrapper" style="padding: 4rem 0;">
            <h1>문의하기</h1>
            <p>제휴 문의나 피드백은 아래 양식을 통해 보내주세요.</p>
            <form style="margin-top: 2rem;">
                <div style="margin-bottom: 1rem;">
                    <label style="display:block; margin-bottom:0.5rem;">이메일</label>
                    <input type="email" placeholder="example@email.com" style="width:100%; padding:0.8rem; border:1px solid var(--border); border-radius:8px; background:var(--card-bg); color:var(--text-primary);">
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display:block; margin-bottom:0.5rem;">메시지</label>
                    <textarea rows="5" placeholder="문의 내용을 입력하세요." style="width:100%; padding:0.8rem; border:1px solid var(--border); border-radius:8px; background:var(--card-bg); color:var(--text-primary);"></textarea>
                </div>
                <button type="button" onclick="alert('문의 기능은 현재 준비 중입니다.')" style="background:var(--accent); color:white; border:none; padding:1rem 2rem; border-radius:8px; cursor:pointer;">전송하기</button>
            </form>
        </article>
    </main>
    <footer class="footer-bottom">
        <p>© 2026 하루 인사이트</p>
    </footer>
    <script src="assets/js/main.js"></script>
</body>
</html>
