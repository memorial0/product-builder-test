<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의하기 - 월급 인사이트</title>
    <meta name="description" content="월급 인사이트에 궁금한 점이 있다면 언제든 문의해 주세요.">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="/" class="logo">월급 인사이트</a>
            <nav class="nav-links">
                <a href="/">홈</a>
                <a href="/posts/">정보 가이드</a>
                <a href="/about/">사이트 소개</a>
            </nav>
        </div>
    </header>
    <main class="content-container">
        <article class="static-page">
            <h1>문의하기</h1>
            <p>월급 인사이트는 사용자의 소중한 의견을 기다립니다. 서비스 이용 중 불편한 사항이나 제안하고 싶은 내용, 또는 광고/제휴 관련 문의가 있으시면 아래의 방법을 이용해 주세요.</p>
            
            <div style="background: var(--surface-color); padding: 2.5rem; border-radius: 12px; margin: 2.5rem 0; border: 1px solid var(--border-color);">
                <form id="contact-form" action="https://formspree.io/f/xgolpvjd" method="POST">
                    <!-- Formspree Config -->
                    <input type="hidden" name="_subject" value="Partnership Inquiry">
                    
                    <div style="margin-bottom: 1.5rem;">
                        <label for="name" style="display:block; margin-bottom:0.5rem; font-weight:600;">이름</label>
                        <input type="text" id="name" name="name" class="input-field" placeholder="성함을 입력해주세요" required>
                    </div>
                    
                    <div style="margin-bottom: 1.5rem;">
                        <label for="email" style="display:block; margin-bottom:0.5rem; font-weight:600;">이메일 주소</label>
                        <input type="email" id="email" name="email" class="input-field" placeholder="example@email.com" required>
                    </div>
                    
                    <div style="margin-bottom: 2rem;">
                        <label for="message" style="display:block; margin-bottom:0.5rem; font-weight:600;">문의 내용</label>
                        <textarea id="message" name="message" class="input-field" rows="5" placeholder="문의하실 내용을 입력해주세요" required style="resize: vertical;"></textarea>
                    </div>
                    
                    <button type="submit" id="submit-btn" class="btn-primary" style="width: 100%; padding: 1.2rem; font-size: 1.1rem; border-radius: 8px;">문의하기</button>
                    
                    <p id="status-message" style="margin-top: 1.5rem; font-weight: 600; text-align: center; display: none; padding: 1rem; border-radius: 8px;"></p>
                </form>
            </div>

            <script>
                const form = document.getElementById('contact-form');
                const btn = document.getElementById('submit-btn');
                const status = document.getElementById('status-message');

                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    btn.disabled = true;
                    const originalBtnText = btn.textContent;
                    btn.textContent = 'Sending...';
                    status.style.display = 'none';

                    const formData = new FormData(form);

                    try {
                        const response = await fetch(form.action, {
                            method: 'POST',
                            body: formData,
                            headers: {
                                'Accept': 'application/json'
                            }
                        });

                        if (response.ok) {
                            status.textContent = '문의가 접수되었습니다. 24시간 내 회신드릴게요.';
                            status.style.backgroundColor = '#ecfdf5';
                            status.style.color = '#059669';
                            status.style.display = 'block';
                            form.reset();
                        } else {
                            throw new Error();
                        }
                    } catch (error) {
                        status.textContent = '전송에 실패했습니다. 잠시 후 다시 시도해주세요.';
                        status.style.backgroundColor = '#fef2f2';
                        status.style.color = '#dc2626';
                        status.style.display = 'block';
                    } finally {
                        btn.disabled = false;
                        btn.textContent = originalBtnText;
                    }
                });
            </script>

            <h3>문의 시 참고사항</h3>
            <ul>
                <li>개별적인 세무 상담 및 자산 관리 상담은 제한될 수 있습니다.</li>
                <li>오류 제보 시 이용 중인 기기 환경(브라우저 등)을 함께 알려주시면 빠른 해결이 가능합니다.</li>
            </ul>
        </article>
    </main>
    <footer>
        <div class="container">
            <div class="footer-copyright">
                © 2025 월급 인사이트. All rights reserved.
                <br>
                <a href="/privacy-policy/">개인정보처리방침</a> | <a href="/terms/">이용약관</a> | <a href="/contact/">문의하기</a>
            </div>
        </div>
    </footer>
</body>
</html>
