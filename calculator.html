<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연봉 실수령액 계산기 - 월급 인사이트</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="/" class="logo">월급 인사이트</a>
            <nav class="nav-links">
                <a href="/">홈</a>
                <a href="/posts/">정보 가이드</a>
                <a href="/calculator.html">계산기</a>
                <a href="/about/">소개</a>
            </nav>
        </div>
    </header>
    <main class="container" style="padding: 4rem 0;">
        <h1 style="text-align: center;">연봉 실수령액 계산기</h1>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 3rem;">나의 월급과 세금을 실시간으로 시뮬레이션 해보세요.</p>
        
        <div class="static-page" style="max-width: 600px; margin: 0 auto; padding: 2rem; border: 1px solid var(--border-color);">
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">연봉 입력 (원)</label>
                <input type="number" id="salaryInput" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 4px;" placeholder="예: 40000000">
            </div>
            <button onclick="calculate()" style="width: 100%; padding: 1rem; background: var(--primary-color); color: white; border: none; border-radius: 4px; font-weight: 700; cursor: pointer;">계산하기</button>
            
            <div id="resultArea" style="margin-top: 2rem; display: none; background: var(--surface-color); padding: 1.5rem; border-radius: 8px;">
                <h3 style="margin-top: 0;">예상 월 실수령액</h3>
                <p id="resultValue" style="font-size: 2rem; font-weight: 800; color: var(--primary-color);">0원</p>
                <p style="font-size: 0.85rem; color: var(--text-secondary);">* 위 결과는 2024년 세율을 바탕으로 한 추정치이며, 실제와 다를 수 있습니다.</p>
            </div>
        </div>
    </main>
    <script>
        function calculate() {
            const salary = document.getElementById('salaryInput').value;
            if(!salary) return alert('연봉을 입력해주세요.');
            // 단순 계산 로직 (예시용)
            const monthly = Math.floor((salary / 12) * 0.85); 
            document.getElementById('resultValue').innerText = monthly.toLocaleString() + '원';
            document.getElementById('resultArea').style.display = 'block';
        }
    </script>
    <footer>
        <div class="container">
            <div class="footer-copyright">
                © 2025 월급 인사이트. <a href="/privacy-policy/">개인정보처리방침</a> | <a href="/contact/">문의하기</a>
            </div>
        </div>
    </footer>
</body>
</html>
