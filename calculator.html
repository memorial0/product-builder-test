<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연봉 실수령액 계산기 | 월급 인사이트</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/main.js" defer></script>
    <script src="assets/js/calculator.js" defer></script>
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">월급 인사이트</a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="calculator.html">계산기</a>
                <a href="guides/index.html">가이드</a>
                <a href="about.html">소개</a>
            </nav>
        </div>
    </header>
    <main class="container">
        <h1 style="margin-top:2rem; text-align:center;">연봉 실수령액 계산기</h1>
        <div class="calculator-layout" id="salary-form">
            <div style="background:var(--surface-color); padding:1.5rem; border-radius:1rem;">
                <h3>입력 정보</h3>
                <div style="margin-top:1rem;">
                    <label>연봉 (원)</label>
                    <input type="number" id="salary" class="input-field" placeholder="예: 40000000">
                </div>
                <div style="margin-top:1rem;">
                    <label>부양가족 수</label>
                    <input type="number" id="dependents" class="input-field" value="1" min="1">
                </div>
                <div style="margin-top:1rem;">
                    <label>20세 이하 자녀 수</label>
                    <input type="number" id="children" class="input-field" value="0" min="0">
                </div>
                <div style="margin-top:1rem;">
                    <label>비과세액 (월)</label>
                    <input type="number" id="non-taxable" class="input-field" value="200000">
                </div>
                <div style="margin-top:1.5rem; padding-top:1rem; border-top:1px dashed var(--border-color);">
                    <label>예상 인상률 (%)</label>
                    <input type="number" id="increase-rate" class="input-field" value="0">
                </div>
            </div>
            <div style="background:var(--surface-color); padding:1.5rem; border-radius:1rem;">
                <h3>계산 결과</h3>
                <div style="text-align:center; margin:1.5rem 0;">
                    <span style="font-size:0.9rem; color:var(--text-secondary);">월 예상 실수령액</span>
                    <h2 id="result-monthly-net" style="font-size:2.5rem; color:var(--primary-color);">0원</h2>
                    <small>세전 월급: <span id="result-monthly-raw">0원</span></small>
                </div>
                <div style="font-size:0.9rem;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;">
                        <span>총 공제액 합계</span><strong id="result-deduction-total">0원</strong>
                    </div>
                    <div style="padding-top:1rem; border-top:1px solid var(--border-color);">
                        <p>인상 후 연봉: <strong id="sim-new-salary">0원</strong></p>
                        <p>인상 후 월 수령액: <strong id="sim-new-net">0원</strong></p>
                    </div>
                </div>
            </div>
        </div>
        <div class="ad-placeholder">광고 영역 (중간)</div>
    </main>
    <footer><div class="container"><p>© 2025 월급 인사이트</p></div></footer>
</body>
</html>
