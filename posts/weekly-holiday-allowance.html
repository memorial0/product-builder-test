            <h1>주휴수당 계산법: 누구나 알아야 할 핵심 정리</h1>
            <p>주휴수당은 1주일 동안 규정된 근무 일수를 다 채운 근로자에게 유급 휴일을 주는 제도입니다.</p>
            <h2>지급 조건</h2>
            <p>1주 소정근로시간이 15시간 이상이고, 약속한 근무일을 개근해야 합니다. 다음 주에도 근로가 예정되어 있어야 지급 대상이 됩니다.</p>
            <h2>계산 공식</h2>
            <p>1주 40시간 이상 근무자의 경우: 8시간 × 시급. 40시간 미만 근무자의 경우: (1주 총 근로시간 ÷ 40시간) × 8 × 시급으로 계산합니다.</p>
